context: {}

package:
  name: r-sffdr
  version: 1.0.0

source:
- url: https://cran.r-project.org/src/contrib/sffdr_1.0.0.tar.gz
  sha256: 1ff2627728b14a37fba8e7350701c66ee99964705f2a623ca1be567866e9567c

build:
  script: R CMD INSTALL --build .

requirements:
  build:
  - ${{ compiler('c') }}
  - ${{ compiler('cxx') }}
  - make
  host:
  - r-base
  - r-rcpp
  - r-locfit
  - r-dplyr
  - r-ggplot2 >=3.5.1
  - r-patchwork >=1.3.0
  - r-gam
  - r-mgcv
  - bioconductor-qvalue
  - r-tibble
  - r-tidyr
  run:
  - r-base
  - r-locfit
  - r-dplyr
  - r-ggplot2 >=3.5.1
  - r-patchwork >=1.3.0
  - r-gam
  - r-mgcv
  - bioconductor-qvalue
  - r-tibble
  - r-tidyr
  - r-rcpp
  - r-testthat >=3.0.0  # suggested
  - r-knitr  # suggested
  - r-rmarkdown  # suggested
  - r-fastglm  # suggested

tests:
- script:
  - Rscript -e 'library("sffdr")'

about:
  homepage: https://github.com/ajbass/sffdr
  summary: |-
    Surrogate Functional False Discovery Rates for Genome-Wide
    Association Studies
  description: |-
    Pleiotropy-informed significance analysis of genome-wide
    association studies (GWAS) with surrogate functional false
    discovery rates (sfFDR). The sfFDR framework adapts the fFDR to
    leverage informative data from multiple sets of GWAS summary
    statistics to increase power in study while accommodating for
    linkage disequilibrium. sfFDR provides estimates of key FDR
    quantities in a significance analysis such as the functional
    local FDR and q-value, and uses these estimates to derive a
    functional p-value for type I error rate control and a
    functional local Bayes' factor for post-GWAS analyses (e.g.,
    fine mapping and colocalization). The sfFDR framework is
    described in Bass and Wallace (2024)
    <doi:10.1101/2024.09.24.24314276>.
  license: GPL-3.0-only
  repository: https://github.com/cran/sffdr

